name: Build Windows Static EXE

on:
  push:
    branches:
      - build
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-static:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: lukka/get-vcpkg@v11

      - name: Install static Qt dependencies (vcpkg)
        shell: pwsh
        run: |
          vcpkg install qtbase qtmultimedia --triplet x64-windows-static

      - name: Configure (CMake static)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded$<$<CONFIG:Debug>:Debug>"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Locate EXE
        id: locate
        shell: pwsh
        run: |
          $exeFile = Get-ChildItem -Path "build" -Filter "EVEAPMPreview.exe" -Recurse -File | Select-Object -First 1
          if (-not $exeFile) {
            throw "Expected executable not found under build/"
          }
          $exe = $exeFile.FullName
          "Using executable: $exe"
          "exe_path=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload static EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVEAPMPreview-static-exe
          path: ${{ steps.locate.outputs.exe_path }}
          if-no-files-found: error
